<!-- TRANSITION -->

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getAuth,
  signInWithEmailAndPassword,
  sendPasswordResetEmail,
  setPersistence,
  browserLocalPersistence

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDaOJQBbu-XwgLkcrsiTkoiCywq9u2mNlA",

  authDomain: "control-racing.firebaseapp.com",

  projectId: "control-racing",

  storageBucket: "control-racing.firebasestorage.app",

  messagingSenderId: "114488486568",

  appId: "1:114488486568:web:bba81c86949cf38d91f09d"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* INPUTS */

const email =
document.getElementById("email");

const password =
document.getElementById("password");

/* ENTER PARA LOGAR */

[email, password].forEach(input => {

  input.addEventListener("keydown", (event) => {

    if(event.key === "Enter"){

      document
      .getElementById("loginBtn")
      .click();

    }

  });

});

/* LOGIN */

document
.getElementById("loginBtn")
.addEventListener("click", async () => {

  try{

    await setPersistence(
      auth,
      browserLocalPersistence
    );
    
    const cred = await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    const user = cred.user;

    const userRef = doc(db, "usuarios", user.uid);
    const userSnap = await getDoc(userRef);

    let nomeUsuario = "Usuário";

    if (userSnap.exists()) {
      nomeUsuario = userSnap.data().nome || user.email;
    }

    await addDoc(collection(db, "acessos"), {
      uid: user.uid,
      email: user.email,
      nome: nomeUsuario,
      data: serverTimestamp(),
      navegador: navigator.userAgent
    });

    window.location.href = "painel.html";

  }catch(error){

    console.error(error);
    alert("Login inválido.");

  }

});

/* RESET PASSWORD */

document
.getElementById("resetBtn")
.addEventListener("click", async () => {

  if(!email.value){

    alert("Digite seu e-mail.");

    return;

  }

  try{

    await sendPasswordResetEmail(
      auth,
      email.value
    );

    alert("E-mail de recuperação enviado!");

  }catch(error){

    alert(error.message);

  }

});

</script>

<div class="page-transition"></div>
<script src="script.js"></script>
<script type="module" src="js/login.js"></script>
</body>
</html>
