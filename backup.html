<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Backup Firebase - Control Racing</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      min-height: 100vh;
      background: #050505;
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .backup-card {
      max-width: 800px;
      width: 100%;
      background: rgba(5, 5, 5, 0.92);
      border: 1px solid rgba(0, 229, 255, 0.4);
      border-radius: 18px;
      padding: 35px;
      text-align: center;
      box-shadow: 0 0 35px rgba(0, 229, 255, 0.15);
    }

    h1 {
      color: #00E5FF;
      margin-bottom: 20px;
    }

    h2 {
      color: #00E5FF;
      margin-top: 35px;
      font-size: 18px;
    }

    p {
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 25px;
    }

    button {
      background: #00E5FF;
      color: #050505;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin: 8px;
    }

    .back-btn {
      background: transparent;
      color: #00E5FF;
      border: 1px solid #00E5FF;
    }

    .danger-btn {
      background: #ff3b3b;
      color: #fff;
    }

    input[type="file"] {
      margin: 15px 0;
      color: #fff;
    }

    #status {
      margin-top: 20px;
      color: #aaa;
      font-size: 14px;
      white-space: pre-line;
    }

    .warning {
      color: #ffb347;
      font-size: 13px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="backupContent" style="display:none;">

  <div class="backup-card">

    <h1>BACKUP FIREBASE</h1>

    <p>
      Exporte ou restaure os dados principais do banco da Control Racing.
    </p>

    <h2>EXPORTAR BACKUP</h2>

    <button id="backupBtn">
      GERAR BACKUP JSON
    </button>

    <h2>IMPORTAR BACKUP</h2>

    <p class="warning">
      Atenção: a restauração pode sobrescrever documentos existentes com os dados do arquivo JSON.
    </p>

    <input type="file" id="restoreFile" accept=".json">

    <br>

    <button id="restoreBtn" class="danger-btn">
      RESTAURAR BACKUP JSON
    </button>

    <br>

    <button class="back-btn" onclick="window.location.href='admin.html'">
      VOLTAR
    </button>

    <div id="status"></div>

  </div>

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDaOJQBbu-XwgLkcrsiTkoiCywq9u2mNlA",
  authDomain: "control-racing.firebaseapp.com",
  projectId: "control-racing",
  storageBucket: "control-racing.firebasestorage.app",
  messagingSenderId: "114488486568",
  appId: "1:114488486568:web:bba81c86949cf38d91f09d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const statusBox = document.getElementById("status");
const backupBtn = document.getElementById("backupBtn");
const restoreBtn = document.getElementById("restoreBtn");
const restoreFile = document.getElementById("restoreFile");

let permitidoAdmin = false;

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const userRef = doc(db, "usuarios", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    window.location.href = "painel.html";
    return;
  }

  const data = userSnap.data();

  const permitido =
    (
      data.equipe === "Founder" &&
      data.ordem === 1
    )
    ||
    (
      data.equipe === "Manager" &&
      data.ordem === 2
    );

  if (!permitido) {
    window.location.href = "painel.html";
    return;
  }

  permitidoAdmin = true;

  document.getElementById("backupContent").style.display = "block";

});

async function exportarColecao(nomeColecao) {

  const snap = await getDocs(collection(db, nomeColecao));

  const dados = {};

  snap.forEach((docSnap) => {
    dados[docSnap.id] = docSnap.data();
  });

  return dados;
}

/* ========================= */
/* EXPORTAR BACKUP */
/* ========================= */

backupBtn.addEventListener("click", async () => {

  if (!permitidoAdmin) {
    alert("Acesso negado.");
    window.location.href = "painel.html";
    return;
  }

  try {

    statusBox.innerText = "Gerando backup...";

    const backup = {
      geradoEm: new Date().toLocaleString("pt-BR"),
      projeto: "Control Racing",
      versao: 2,
      colecoes: {
        usuarios: await exportarColecao("usuarios"),
        pedidos: await exportarColecao("pedidos"),
        financeiro: await exportarColecao("financeiro"),
        coletas: await exportarColecao("coletas"),
        playoffs: await exportarColecao("playoffs"),
        acessos: await exportarColecao("acessos"),
        sistema: await exportarColecao("sistema"),
        inscricoes: await exportarColecao("inscricoes"),
        corridas: await exportarColecao("corridas")
      }
    };

    const json = JSON.stringify(backup, null, 2);

    const blob = new Blob([json], {
      type: "application/json"
    });

    const url = URL.createObjectURL(blob);

    const dataArquivo = new Date()
      .toISOString()
      .slice(0, 10);

    const a = document.createElement("a");

    a.href = url;
    a.download = `backup-control-racing-${dataArquivo}.json`;

    document.body.appendChild(a);

    a.click();

    document.body.removeChild(a);

    URL.revokeObjectURL(url);

    statusBox.innerText = "Backup gerado com sucesso.";

  } catch (error) {

    console.error(error);

    statusBox.innerText = "Erro ao gerar backup.";

    alert("Erro ao gerar backup: " + error.message);

  }

});

/* ========================= */
/* IMPORTAR BACKUP */
/* ========================= */

function lerArquivoJSON(file) {
  return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.onload = () => {
      try {
        const json = JSON.parse(reader.result);
        resolve(json);
      } catch (error) {
        reject(new Error("Arquivo JSON inválido."));
      }
    };

    reader.onerror = () => {
      reject(new Error("Erro ao ler o arquivo."));
    };

    reader.readAsText(file);

  });
}

async function restaurarColecao(nomeColecao, documentos) {

  let total = 0;

  for (const docId in documentos) {

    if (!Object.prototype.hasOwnProperty.call(documentos, docId)) {
      continue;
    }

    const dados = documentos[docId];

    await setDoc(
      doc(db, nomeColecao, docId),
      dados,
      { merge: true }
    );

    total++;

  }

  return total;
}

restoreBtn.addEventListener("click", async () => {

  if (!permitidoAdmin) {
    alert("Acesso negado.");
    window.location.href = "painel.html";
    return;
  }

  const file = restoreFile.files[0];

  if (!file) {
    alert("Selecione um arquivo JSON de backup.");
    return;
  }

  const confirmar1 = confirm(
    "Tem certeza que deseja restaurar este backup? Documentos existentes podem ser sobrescritos."
  );

  if (!confirmar1) return;

  const confirmar2 = confirm(
    "Confirma novamente? Essa ação deve ser feita apenas se você tiver certeza."
  );

  if (!confirmar2) return;

  try {

    statusBox.innerText = "Lendo arquivo de backup...";

    const backup = await lerArquivoJSON(file);

    if (!backup.colecoes) {
      alert("Backup inválido: objeto 'colecoes' não encontrado.");
      return;
    }

    const colecoesPermitidas = [
      "usuarios",
      "pedidos",
      "financeiro",
      "coletas",
      "playoffs",
      "acessos",
      "sistema",
      "inscricoes",
      "corridas"
    ];

    let relatorio = "Iniciando restauração...\n";

    for (const nomeColecao of colecoesPermitidas) {

      if (!backup.colecoes[nomeColecao]) {
        relatorio += `\n${nomeColecao}: ignorada, não existe no backup.`;
        statusBox.innerText = relatorio;
        continue;
      }

      relatorio += `\nRestaurando ${nomeColecao}...`;
      statusBox.innerText = relatorio;

      const total = await restaurarColecao(
        nomeColecao,
        backup.colecoes[nomeColecao]
      );

      relatorio += ` concluído (${total} documentos).`;
      statusBox.innerText = relatorio;

    }

    relatorio += "\n\nRestauração concluída com sucesso.";
    statusBox.innerText = relatorio;

    alert("Backup restaurado com sucesso!");

  } catch (error) {

    console.error(error);

    statusBox.innerText = "Erro ao restaurar backup.";

    alert("Erro ao restaurar backup: " + error.message);

  }

});

</script>

</body>
</html>
