<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  getDocs,
  query,
  orderBy

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDaOJQBbu-XwgLkcrsiTkoiCywq9u2mNlA",

  authDomain: "control-racing.firebaseapp.com",

  projectId: "control-racing",

  storageBucket: "control-racing.firebasestorage.app",

  messagingSenderId: "114488486568",

  appId: "1:114488486568:web:bba81c86949cf38d91f09d"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LOAD */

async function loadCorridas(){

  const grid =
  document.getElementById("corridas-grid");

  const q = query(

    collection(db, "corridas"),

    orderBy("criadoEm", "desc")

  );

  const querySnapshot =
  await getDocs(q);

  querySnapshot.forEach((docSnap) => {

    const corrida =
    docSnap.data();

    const card =
    document.createElement("div");

    card.classList.add("corrida-card");

    let resultadosHTML = "";

    corrida.resultados
    .sort((a,b) => a.posicao - b.posicao)
    .forEach((piloto) => {

      resultadosHTML += `

        <div class="resultado-row">

          <span>
            #${piloto.posicao}
          </span>

          <span>
            ${piloto.nome}
          </span>

          <span>
            ${piloto.pontos} PTS
          </span>

        </div>

      `;

    });

    card.innerHTML = `

      <div class="corrida-top">

        <div>

          <h2>
            ${corrida.nome}
          </h2>

          <span>
            ${corrida.pista}
          </span>

        </div>

        <div class="corrida-date">

          ${corrida.data}

        </div>

      </div>

      <div class="corrida-results">

        ${resultadosHTML}

      </div>

    `;

    grid.appendChild(card);

  });

}

loadCorridas();

</script>
