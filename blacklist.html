<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  limit,
  where

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDaOJQBbu-XwgLkcrsiTkoiCywq9u2mNlA",

  authDomain: "control-racing.firebaseapp.com",

  projectId: "control-racing",

  storageBucket: "control-racing.firebasestorage.app",

  messagingSenderId: "114488486568",

  appId: "1:114488486568:web:bba81c86949cf38d91f09d"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LOAD BLACKLIST */

async function loadBlacklist(){

  const topContainer =
  document.getElementById("top-driver-container");

  const grid =
  document.getElementById("mw-grid");

  const q = query(

    collection(db, "usuarios"),

    where("visivel", "==", true),

    orderBy("rank", "asc"),

    limit(10)

  );

  const querySnapshot =
  await getDocs(q);

  querySnapshot.forEach((docSnap) => {

    const data = docSnap.data();

    /* TOP 1 */

    if(data.rank === 1){

      topContainer.innerHTML = `

        <a href="piloto.html?uid=${docSnap.id}&mode=blacklist">

          <div class="top-driver">

            <div class="rank">
              #${data.rank}
            </div>

            <img src="${data.fotoBlacklist}">

            <div class="overlay"></div>

            <div class="content">

                <h2>${data.nome}</h2>

              <div class="car">
                ${data.carro}
              </div>

            </div>

          </div>

        </a>

      `;

    }

    /* TOP 2-10 */

    else{

      const card =
      document.createElement("a");

      card.href =
      `piloto.html?uid=${docSnap.id}&mode=blacklist`;

      card.innerHTML = `

        <div class="mw-card">

          <div class="rank">
            #${data.rank}
          </div>

          <img src="${data.fotoBlacklist}">

          <div class="overlay"></div>

          <div class="content">

              <h2>${data.nome}</h2>

            <div class="car">
              ${data.carro}
            </div>

          </div>

        </div>

      `;

      grid.appendChild(card);

    }

  });

}

loadBlacklist();

</script>
