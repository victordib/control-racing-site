<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { firebaseConfig } from "./js/firebase-config.js";

import {

  getFirestore,
  doc,
  getDoc,
  onSnapshot

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* ========================= */
/* GET PILOT */
/* ========================= */

async function getPilot(uid){

  if(!uid){

    return {
      nome: "---"
    };

  }

  const pilotRef =
  doc(db, "usuarios", uid);

  const pilotSnap =
  await getDoc(pilotRef);

  if(pilotSnap.exists()){

    return pilotSnap.data();

  }

  return {
    nome: "---"
  };

}

/* ========================= */
/* CREATE PLAYER */
/* ========================= */

function createPlayer(
  pilot,
  isWinner = false,
  isChampion = false
){

  const avatar =
  pilot?.foto || 
  "https://a.imagem.app/GYxzpt.png";

  const name =
  pilot?.nome || "AGUARDANDO";

  return `

    <div class="player
      ${isWinner ? "winner" : ""}
      ${isChampion ? "champion" : ""}">

      <img
        class="player-avatar"
        src="${avatar}"
        alt="${name}">

      <span class="player-name">

        ${name}

      </span>

    </div>

  `;

}

/* ========================= */
/* RENDER ROUND */
/* ========================= */

async function renderRound(
  title,
  matches,
  extraClass = "",
  isFinal = false
){

  let html = `

    <div class="round ${extraClass}">

      <h2>
        ${title}
      </h2>

  `;

  for(const match of matches){

    const p1 =
    await getPilot(match.piloto1);

    const p2 =
    await getPilot(match.piloto2);

    html += `

      <div class="match
        ${isFinal ? "final" : ""}">

        ${createPlayer(

          p1,

          match.vencedor === match.piloto1,

          isFinal &&
          match.vencedor === match.piloto1

        )}

        ${createPlayer(

          p2,

          match.vencedor === match.piloto2,

          isFinal &&
          match.vencedor === match.piloto2

        )}

      </div>

    `;

  }

  html += `

    </div>

  `;

  return html;

}

/* ========================= */
/* LOAD PLAYOFFS */
/* ========================= */

async function loadPlayoffs(){

  document.getElementById("bracket").innerHTML = "";

  const playoffsRef =
  doc(db, "playoffs", "temporadaAtual");

  const playoffsSnap =
  await getDoc(playoffsRef);

  if(!playoffsSnap.exists()){

    document.getElementById("bracket").innerHTML = `

      <div class="round">

        <h2>
          Nenhum playoff criado
        </h2>

      </div>

    `;

    return;

  }

  const data =
  playoffsSnap.data();

  const bracket =
  document.getElementById("bracket");

  bracket.innerHTML = "";

  /* QUARTAS */

  bracket.innerHTML += await renderRound(

    "QUARTAS",

    data.quartas || []

  );

  /* SEMIFINAL */

  bracket.innerHTML += await renderRound(

    "SEMIFINAL",

    data.semifinais || [],

    "semi-round"

  );

  /* FINAL */

  bracket.innerHTML += await renderRound(

    "FINAL",

    data.final || [],

    "final-round",

    true

  );

}

/* REALTIME PLAYOFFS */

onSnapshot(

  doc(db, "playoffs", "temporadaAtual"),

  async () => {

    await loadPlayoffs();

  }

);

</script>
