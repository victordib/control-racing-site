<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getFirestore,
  collection,
  getDocs

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDaOJQBbu-XwgLkcrsiTkoiCywq9u2mNlA",

  authDomain: "control-racing.firebaseapp.com",

  projectId: "control-racing",

  storageBucket: "control-racing.firebasestorage.app",

  messagingSenderId: "114488486568",

  appId: "1:114488486568:web:bba81c86949cf38d91f09d"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LOAD CAMPEONATO */

async function loadCampeonato(){

  const top3Grid =
  document.getElementById("top3-grid");

  const rankingGrid =
  document.getElementById("ranking-grid");

  top3Grid.innerHTML = "";

  rankingGrid.innerHTML = "";

  /* BUSCA CORRIDAS */

  const querySnapshot =
  await getDocs(collection(db, "corridas"));

  /* RANKING */

  const ranking = {};

  querySnapshot.forEach((docSnap) => {

    const corrida = docSnap.data();

    corrida.resultados.forEach((piloto) => {

      if(!ranking[piloto.uid]){

        ranking[piloto.uid] = {

          uid: piloto.uid,

          nome: piloto.nome,

          foto: piloto.foto,

          pontos: 0

        };

      }

      ranking[piloto.uid].pontos += piloto.pontos;

    });

  });

  /* CONVERTE ARRAY */

  const rankingArray =
  Object.values(ranking);

  /* ORDENA */

  rankingArray.sort((a,b) => {

    return b.pontos - a.pontos;

  });

  /* RENDER */

  rankingArray.forEach((piloto, index) => {

    const posicao = index + 1;

    /* TOP 3 */

    if(posicao <= 3){

      let classe = "";

      if(posicao === 1){

        classe = "first";

      }

      else if(posicao === 2){

        classe = "second";

      }

      else{

        classe = "third";

      }

      const card =
      document.createElement("div");

      card.classList.add("top-card");

      card.classList.add(classe);

      card.innerHTML = `

        <div class="position">

          #${posicao}

        </div>

        <img src="${piloto.foto}">

        <h2>${piloto.nome}</h2>

        <span>

          ${piloto.pontos} PTS

        </span>

      `;

      top3Grid.appendChild(card);

    }

    /* RESTANTE */

    else{

      const row =
      document.createElement("div");

      row.classList.add("ranking-row");

      row.innerHTML = `

        <span>

          #${posicao}

        </span>

        <span>

          ${piloto.nome}

        </span>

        <span>

          ${piloto.pontos}

        </span>

      `;

      rankingGrid.appendChild(row);

    }

  });

}

loadCampeonato();

</script>
