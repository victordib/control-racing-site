<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Control Racing - Acessos</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
  body {
    min-height: 100vh;
    background: #050505;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    padding: 40px;
  }

  .acessos-card {
    max-width: 1200px;
    margin: 0 auto;
    background: rgba(5, 5, 5, 0.9);
    border: 1px solid rgba(0, 229, 255, 0.35);
    border-radius: 18px;
    padding: 30px;
    box-shadow: 0 0 30px rgba(0, 229, 255, 0.12);
  }

  h1 {
    color: #00E5FF;
    margin-bottom: 25px;
    letter-spacing: 2px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    color: #fff;
  }

  th, td {
    padding: 14px;
    border-bottom: 1px solid rgba(0, 229, 255, 0.18);
    text-align: left;
    font-size: 13px;
  }

  th {
    color: #00E5FF;
  }

  .empty {
    color: #aaa;
    padding: 20px;
  }
</style>
</head>

<body>

  <div class="acessos-card">

    <h1>REGISTRO DE ACESSOS</h1>

    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Nome</th>
          <th>Email</th>
          <th>Navegador</th>
        </tr>
      </thead>
      <tbody id="listaAcessos"></tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      doc,
      getDoc,
      collection,
      query,
      orderBy,
      limit,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDaOJQBbu-XwgLkcrsiTkoiCywq9u2mNlA",
      authDomain: "control-racing.firebaseapp.com",
      projectId: "control-racing",
      storageBucket: "control-racing.firebasestorage.app",
      messagingSenderId: "114488486568",
      appId: "1:114488486568:web:bba81c86949cf38d91f09d"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const lista = document.getElementById("listaAcessos");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      const userRef = doc(db, "usuarios", user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        window.location.href = "painel.html";
        return;
      }

      const dados = userSnap.data();

      const podeVer =
        dados.ordem === 1 ||
        dados.ordem === 2 ||
        dados.equipe === "Founder" ||
        dados.equipe === "Manager";

      if (!podeVer) {
        alert("Acesso negado.");
        window.location.href = "painel.html";
        return;
      }

      const q = query(
        collection(db, "acessos"),
        orderBy("data", "desc"),
        limit(100)
      );

      const snap = await getDocs(q);

      lista.innerHTML = "";

      if (snap.empty) {
        lista.innerHTML = `
          <tr>
            <td colspan="4" class="empty">
              Nenhum acesso registrado.
            </td>
          </tr>
        `;
        return;
      }

      snap.forEach((doc) => {
        const acesso = doc.data();

        let dataFormatada = "Sem data";

        if (acesso.data) {

          if (typeof acesso.data.toDate === "function") {

            dataFormatada =
              acesso.data.toDate().toLocaleString("pt-BR");

          } else if (acesso.data.seconds) {

            dataFormatada =
              new Date(acesso.data.seconds * 1000)
              .toLocaleString("pt-BR");

          }

        }

        lista.innerHTML += `
          <tr>
            <td>${dataFormatada}</td>
            <td>${acesso.nome || "-"}</td>
            <td>${acesso.email || "-"}</td>
            <td>${acesso.navegador || "-"}</td>
          </tr>
        `;
      });
    });
  </script>

</body>
</html>
