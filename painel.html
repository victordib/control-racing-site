<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getAuth,
  onAuthStateChanged,
  signOut

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

  getFirestore,
  doc,
  getDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  updatePassword,
  reauthenticateWithCredential,
  EmailAuthProvider
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* FIREBASE */

const firebaseConfig = {

  apiKey: "AIzaSyDaOJQBbu-XwgLkcrsiTkoiCywq9u2mNlA",

  authDomain: "control-racing.firebaseapp.com",

  projectId: "control-racing",

  storageBucket: "control-racing.firebasestorage.app",

  messagingSenderId: "114488486568",

  appId: "1:114488486568:web:bba81c86949cf38d91f09d"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

/* AUTH */

onAuthStateChanged(auth, async (user) => {

  if(user){

    /* UID */

    const uid = user.uid;

    /* BUSCA DOCUMENTO */

    const docRef = doc(db, "usuarios", uid);

    const docSnap = await getDoc(docRef);

    if(docSnap.exists()){

      const data = docSnap.data();

      /* ========================= */
      /* ADMIN BUTTONS */
      /* ========================= */

      let buttonsHTML = "";

      if(
        data.equipe === "Founder" &&
        data.ordem === 1
      ){

        buttonsHTML += `

          <h3>
            ADMINISTRAÇÃO
          </h3>

          <div class="action-buttons">

            <a href="admin.html">

              <button class="action-btn admin-action">
                ADMIN PANEL
              </button>

            </a>

        `;

      }

      if(
        (data.equipe === "Founder" && data.ordem === 1)
        ||
        (data.equipe === "Manager" && data.ordem === 2)
      ){

        if(buttonsHTML === ""){

          buttonsHTML += `

            <h3>
              ADMINISTRAÇÃO
            </h3>

            <div class="action-buttons">

          `;

        }

        buttonsHTML += `

            <a href="admin-pedidos.html">

              <button class="action-btn admin-action">
                ADMIN PEDIDOS
              </button>

            </a>

            <a href="caixa.html">

              <button class="action-btn admin-action">
                CAIXA
              </button>

            </a>

        `;

      }

      if(buttonsHTML !== ""){

        buttonsHTML += `
          </div>
        `;

      }

      document
      .getElementById("admin-area")
      .innerHTML = buttonsHTML;

      if(buttonsHTML === ""){

        document
        .getElementById("admin-area")
        .style.display = "none";

      }else{

        document
        .getElementById("admin-area")
        .style.display = "block";

      }

      /* RENDER */

      document
      .getElementById("admin-area")
      .innerHTML = buttonsHTML;

      /* NOME */

      document
      .getElementById("pilot-name")
      .innerText = data.nome;

      /* CARRO */

      document
      .querySelector(".car-name")
      .innerText = data.carro;

      /* RANK */

      document
      .querySelector(".pilot-rank")
      .innerText = "#" + data.rank;

      document
      .getElementById("tag-status")
      .innerText =
      "STATUS: " + data.status;

      document
      .getElementById("tag-cargo")
      .innerText =
      "CARGO: " + data.equipe;

      document
      .getElementById("tag-rank")
      .innerText =
      "RANK: #" + data.rank;

      /* FOTO */

      document
      .getElementById("pilot-photo")
      .src = data.foto;

    }

  }else{

    window.location.href = "login.html";

  }

});

/* Trocar Password */
document.getElementById("changePasswordBtn").addEventListener("click", async () => {

  const user = auth.currentUser;

  if (!user) return;

  const currentPassword = prompt("Digite sua senha atual:");
  const newPassword = prompt("Digite sua nova senha:");


  if (!currentPassword || !newPassword){

    return;

  }

  if(newPassword.length < 6){

    alert("A nova senha precisa ter pelo menos 6 caracteres.");

    return;

  }

  try {

    const credential = EmailAuthProvider.credential(
      user.email,
      currentPassword
    );

    await reauthenticateWithCredential(user, credential);

    await updatePassword(user, newPassword);

    alert("Senha alterada com sucesso!");

  } catch (error) {
    alert("Erro ao trocar senha: " + error.message);
  }

});

/* ========================= */
/* LOGOUT */
/* ========================= */

document
.getElementById("logoutBtn")
.addEventListener("click", async () => {

  try{

    await signOut(auth);

    window.location.href = "login.html";

  }catch(error){

    alert("Erro ao deslogar.");

    console.error(error);

  }

});

</script>


<script src="script.js"></script>

</body>
